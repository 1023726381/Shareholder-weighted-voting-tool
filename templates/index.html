<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f7fa;padding:20px;}
        .card{background:white;padding:40px 30px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.1);max-width:400px;width:100%;text-align:center;}
        .title{font-size:24px;color:#333;margin-bottom:30px;font-weight:bold;}
        .input-box{margin-bottom:25px;}
        input{width:100%;height:45px;padding:0 15px;border:1px solid #eee;border-radius:8px;font-size:16px;outline:none;transition:0.3s;}
        input:focus{border-color:#42C6A5;}
        .submit-btn{width:100%;height:50px;background:#42C6A5;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;transition:0.3s;}
        .submit-btn:hover{background:#35b08f;}
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">{{ title }}</h1>
        <form action="/vote" method="get">
            <p style="color:green;font-size:14px;":>请输入您的姓名+手身份证号</p>
            <div class="input-box">
                <input type="text" name="voter_name" placeholder="(例如：张三14051119900307663X)" required>
            </div>
            <button type="submit" class="submit-btn">进入投票</button>
        </form>
    </div>
</body>
</html>
