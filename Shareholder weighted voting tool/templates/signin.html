<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>会议签到</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f7fa;padding:20px;}
        .card{background:white;padding:40px 30px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.1);max-width:400px;width:100%;text-align:center;}
        .title{font-size:24px;color:#333;margin-bottom:30px;font-weight:bold;}
        .input-box{margin-bottom:15px;}
        input{width:100%;height:45px;padding:0 15px;border:1px solid #eee;border-radius:8px;font-size:16px;outline:none;transition:0.3s;}
        input:focus{border-color:#42C6A5;}
        .btn{width:100%;height:50px;background:#42C6A5;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;transition:0.3s;}
        .btn:hover{background:#35b08f;}
        .error{color:red;margin-bottom:15px;}
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">会议签到</h1>
        <form method="post">
            <div class="input-box">
                <input type="text" name="name" placeholder="姓名" required>
            </div>
            <div class="input-box">
                <input type="text" name="id_card" placeholder="身份证号" required>
            </div>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn">签到</button>
        </form>
    </div>
</body>
</html>
