<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无投票权限</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f7fa;padding:20px;}
        .warn-card{background:white;padding:50px 40px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.1);text-align:center;max-width:420px;width:100%;}
        .warn-icon{width:70px;height:70px;background:#FF6B35;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;color:white;font-size:36px;}
        .warn-title{font-size:24px;color:#333;margin-bottom:12px;font-weight:bold;}
        .warn-desc{font-size:16px;color:#666;margin-bottom:35px;line-height:1.6;}
        .back-btn{display:inline-block;width:100%;height:50px;line-height:50px;background:#FF6B35;color:white;text-decoration:none;border-radius:8px;font-size:18px;transition:all 0.3s ease;}
        .back-btn:hover{background:#e55a2e;transform:translateY(-2px);}
    </style>
</head>
<body>
    <div class="warn-card">
        <div class="warn-icon">!</div>
        <h2 class="warn-title">无投票权限</h2>
        <p class="warn-desc">您不在投票人员列表中，无法参与投票！</p>
        <a href="/" class="back-btn">返回首页</a>
    </div>
</body>
</html>
